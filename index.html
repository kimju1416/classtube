<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Tube — 교육 영상 아카이브</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg2: #181818;
      --surface: #272727;
      --border: #3d3d3d;
      --text: #f1f1f1;
      --sub: #aaaaaa;
      --red: #ff0000;
      --sw: 240px;
      --hh: 64px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--hh);
      background: var(--bg);
      border-bottom: 3px solid var(--red);
      display: flex; align-items: center;
      padding: 0 16px; gap: 10px; z-index: 200;
    }

    .menu-btn {
      width: 40px; height: 40px; background: none; border: none;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      border-radius: 50%; flex-shrink: 0;
    }
    .menu-btn:hover { background: var(--surface); }
    .menu-btn span { display: block; width: 18px; height: 2px; background: var(--text); border-radius: 2px; }

    .logo-area { width: var(--sw); display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; white-space: nowrap; }
    .header-desc { flex-shrink: 0; text-align: right; border-left: 1px solid #333; padding-left: 12px; margin-left: auto; }
    .header-desc .hd-stat { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .header-desc .hd-sub { font-size: 10px; color: var(--sub); margin-top: 1px; }
    .logo em { color: var(--red); font-style: normal; }

    .search-wrap {
      flex: 1; max-width: 540px; display: flex;
      border: 1px solid var(--border);
      border-radius: 40px; overflow: hidden;
      background: #121212;
    }
    .search-wrap input {
      flex: 1; padding: 8px 16px; background: none;
      border: none; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none;
    }
    .search-wrap input::placeholder { color: var(--sub); }
    .search-btn {
      padding: 0 18px; background: var(--surface);
      border: none; border-left: 1px solid var(--border);
      cursor: pointer; color: var(--sub); transition: color 0.15s;
    }
    .search-btn:hover { color: var(--text); }

    .lvl-wrap { display: flex; gap: 6px; flex-shrink: 0; }
    .lvl-btn {
      padding: 6px 14px; border-radius: 999px;
      border: 1px solid var(--border);
      background: none; color: var(--sub);
      font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    .lvl-btn:hover { border-color: var(--text); color: var(--text); }
    .lvl-btn.on { background: var(--text); border-color: var(--text); color: #000; font-weight: 700; }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed; top: var(--hh); left: 0; bottom: 0;
      width: var(--sw); background: var(--bg);
      transition: transform 0.2s; z-index: 100;
    }
    .sidebar.hidden { transform: translateX(-100%); }
    .sb-list {
      position: absolute; top: 0; left: 0; right: 0; bottom: 40px;
      overflow-y: auto; overflow-x: hidden; padding: 12px 0 8px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .sb-list::-webkit-scrollbar { width: 4px; }
    .sb-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sb-sep { margin: 10px 12px; border: none; border-top: 1px solid #282828; }
    .sb-group-label {
      padding: 10px 20px 4px; font-size: 11px; font-weight: 700;
      color: var(--sub); letter-spacing: 0.8px; text-transform: uppercase;
    }

    .sb-item {
      display: flex; align-items: center; gap: 14px;
      padding: 9px 18px; margin: 1px 6px;
      border-radius: 10px; cursor: pointer;
      font-size: 13.5px; color: var(--text); font-weight: 400;
      transition: background 0.1s;
    }
    .sb-item:hover { background: var(--surface); }
    .sb-item.on { background: var(--surface); font-weight: 600; }

    .sb-icon { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
    .sb-label { flex: 1; line-height: 1.3; }
    .sb-count {
      font-size: 11px; color: var(--sub);
      background: #1e1e1e; padding: 1px 7px; border-radius: 999px;
      flex-shrink: 0;
    }
    .sb-item.on .sb-count { background: var(--border); color: var(--text); }

    /* ── SIDEBAR FOOTER (fixed, follows sidebar open/close on mobile) ── */
    .sb-footer {
      position: absolute; left: 0; right: 0; bottom: 0; height: 40px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--bg); border-top: 1px solid #262626;
    }
    .sb-footer-icon { display: flex; color: inherit; text-decoration: none; }
    .icon-mask {
      display: inline-block; width: 15px; height: 15px;
      background-color: var(--sub);
      -webkit-mask-size: contain; mask-size: contain;
      -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
      -webkit-mask-position: center; mask-position: center;
      transition: background-color 0.15s;
    }
    .sb-footer-icon:hover .icon-mask { background-color: var(--red); }
    .icon-instagram { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/simple-icons@13/icons/instagram.svg'); mask-image: url('https://cdn.jsdelivr.net/npm/simple-icons@13/icons/instagram.svg'); }
    .icon-threads { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/simple-icons@13/icons/threads.svg'); mask-image: url('https://cdn.jsdelivr.net/npm/simple-icons@13/icons/threads.svg'); }
    .sb-footer-sep { width: 1px; height: 12px; background: var(--border); }
    .sb-footer-text { font-size: 11.5px; color: var(--sub); letter-spacing: 0.02em; }

    /* ── HEADER SOCIAL ICON ── */
    .ig-link {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ig-link:hover { background: var(--surface); }
    .ig-link .icon-mask { width: 18px; height: 18px; background-color: var(--sub); }
    .ig-link:hover .icon-mask { background-color: var(--red); }

    /* ── OVERLAY (mobile) ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 90;
    }

    /* ── CONTENT ── */
    .content {
      margin-left: var(--sw); margin-top: var(--hh);
      padding: 20px 24px 60px; min-height: calc(100vh - var(--hh));
      transition: margin-left 0.2s;
    }
    .content.full { margin-left: 0; }

    /* time filter */
    .time-row {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 8px; margin-bottom: 18px;
    }
    .time-label { font-size: 12px; color: var(--sub); white-space: nowrap; }
    .time-chip {
      padding: 5px 14px; border-radius: 999px;
      border: 1px solid var(--border);
      background: none; color: var(--sub);
      font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.12s; white-space: nowrap;
    }
    .time-chip:hover { border-color: var(--text); color: var(--text); }
    .time-chip.on { background: var(--text); border-color: var(--text); color: #000; font-weight: 700; }
    .time-chip:disabled { opacity: 0.4; cursor: default; }

    /* grade sub-filter (초등 저학년/고학년) */
    .grade-row { display: none; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 18px; }
    .grade-row.show { display: flex; }

    /* result row + sort */
    .result-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    }
    .result-info { font-size: 13px; color: var(--sub); }
    .sort-wrap { display: flex; gap: 6px; flex-shrink: 0; }
    .sort-chip {
      padding: 4px 12px; border-radius: 999px;
      border: 1px solid var(--border);
      background: none; color: var(--sub);
      font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.12s; white-space: nowrap;
    }
    .sort-chip:hover { border-color: var(--text); color: var(--text); }
    .sort-chip.on { background: var(--text); border-color: var(--text); color: #000; font-weight: 700; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 20px 14px;
    }

    /* ── VIDEO CARD ── */
    .vcard { cursor: pointer; }

    .vthumb {
      position: relative; aspect-ratio: 16/9;
      border-radius: 10px; overflow: hidden;
      background: #1a1a1a; margin-bottom: 10px;
    }
    .vthumb img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: transform 0.25s;
    }
    .vcard:hover .vthumb img { transform: scale(1.04); }

    .vdur {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.88);
      color: #fff; font-size: 11.5px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; letter-spacing: 0.2px;
    }
    .vdur.loading { color: var(--sub); }

    .fav-btn {
      position: absolute; top: 6px; right: 6px; z-index: 2;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; line-height: 1; color: #fff;
      transition: background 0.15s, transform 0.1s;
    }
    .fav-btn:hover { background: rgba(0,0,0,0.85); transform: scale(1.1); }
    .fav-btn.on { color: #ffd400; }

    .vplay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s;
    }
    .vcard:hover .vplay { opacity: 1; }
    .vplay-circle {
      width: 50px; height: 50px;
      background: rgba(255,255,255,0.92); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .vplay-circle svg { width: 18px; height: 18px; fill: #000; margin-left: 4px; }

    .vinfo { padding: 0 2px; }
    .vbadges { display: flex; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
    .vbadge {
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
    }

    .vb-학교폭력예방 { background:#3D0000; color:#FCA5A5; }
    .vb-생명존중     { background:#052E16; color:#6EE7B7; }
    .vb-인성         { background:#2E1065; color:#C4B5FD; }
    .vb-환경         { background:#083B1A; color:#86EFAC; }
    .vb-미디어       { background:#172554; color:#93C5FD; }
    .vb-장애인식     { background:#431407; color:#FED7AA; }
    .vb-다문화       { background:#500724; color:#FBCFE8; }
    .vb-민주시민     { background:#0C1445; color:#A5B4FC; }
    .vb-건강         { background:#450A0A; color:#FECACA; }
    .vb-진로         { background:#083B1A; color:#D9F99D; }
    .vb-도박예방     { background:#3B1F00; color:#FDE68A; }
    .vb-성교육       { background:#2D1347; color:#E9D5FF; }
    .vb-금연         { background:#1E1B00; color:#FEF9C3; }
    .vb-음주예방     { background:#1E1B4B; color:#C7D2FE; }
    .vb-약물예방     { background:#162032; color:#BAE6FD; }
    .vb-안전교육     { background:#1C1208; color:#FEF3C7; }
    .vb-통일평화     { background:#0C1F40; color:#BFDBFE; }
    .vb-역사         { background:#2D1A0A; color:#FDBA74; }
    .vb-경제금융     { background:#052E16; color:#BBF7D0; }
    .vb-독서         { background:#1F1235; color:#DDD6FE; }
    .vb-정신건강     { background:#1A0533; color:#F0ABFC; }
    .vb-식품안전     { background:#0A2010; color:#A7F3D0; }
    .vb-소비자교육   { background:#1A0A20; color:#E9D5FF; }
    .vb-개인정보     { background:#0F172A; color:#94A3B8; }
    .vb-직업창업     { background:#0A2000; color:#C6F6D5; }
    .vb-세계시민     { background:#0A1F2D; color:#7DD3FC; }
    .vb-봉사나눔     { background:#1A0515; color:#FBCFE8; }

    .vb-elem { background:#052E16; color:#6EE7B7; }
    .vb-mid  { background:#172554; color:#93C5FD; }
    .vb-all  { background:#1e1e1e; color:#9CA3AF; border: 1px solid #3F3F3F; }

    .vtitle {
      font-size: 14px; font-weight: 500; color: var(--text);
      line-height: 1.5; margin-bottom: 3px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .vdesc {
      font-size: 11.5px; color: var(--sub); line-height: 1.4;
      margin-bottom: 4px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    .vmeta { font-size: 12px; color: var(--sub); }

    /* ── LOAD MORE ── */
    .more-wrap { text-align: center; margin-top: 36px; }
    .more-btn {
      padding: 10px 40px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.12s;
    }
    .more-btn:hover { background: var(--border); }

    /* ── EMPTY ── */
    .empty-box {
      display: none; text-align: center; padding: 80px 20px; color: var(--sub);
    }
    .empty-box svg { opacity: 0.25; }
    .empty-box p { margin-top: 16px; font-size: 15px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      :root { --sw: 200px; }
    }
    @media (max-width: 768px) {
      .sidebar { width: 260px; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .content { margin-left: 0; }
      .lvl-wrap { display: none; }
      .logo-area { width: auto; }
      .header-desc { display: none; }
    }
    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 12px 8px; }
      .vtitle { font-size: 12px; }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <div class="logo-area">
    <button class="menu-btn" id="menuBtn" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">Class <em>Tube</em></div>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="영상 제목·주제 검색">
    <button class="search-btn" aria-label="검색">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>
  <div class="lvl-wrap">
    <button class="lvl-btn on" data-lv="all">전체</button>
    <button class="lvl-btn" data-lv="elem">초등</button>
    <button class="lvl-btn" data-lv="mid">중등</button>
  </div>
  <div class="header-desc">
    <div class="hd-stat">1,778편+ &nbsp;·&nbsp; 초·중등</div>
    <div class="hd-sub">공강·자율활동·의무교육 영상 아카이브</div>
  </div>
  <a class="ig-link" href="https://instagram.com/kimju.zip" target="_blank" rel="noopener" aria-label="Instagram">
    <span class="icon-mask icon-instagram"></span>
  </a>
</header>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebarShell">
  <div class="sb-list" id="sidebar"></div>
  <div class="sb-footer">
    <a class="sb-footer-icon" href="https://instagram.com/kimju.zip" target="_blank" rel="noopener" aria-label="Instagram">
      <span class="icon-mask icon-instagram"></span>
    </a>
    <a class="sb-footer-icon" href="https://threads.net/@kimju.zip" target="_blank" rel="noopener" aria-label="Threads">
      <span class="icon-mask icon-threads"></span>
    </a>
    <span class="sb-footer-sep"></span>
    <span class="sb-footer-text">kimju.zip</span>
  </div>
</aside>

<!-- Mobile overlay -->
<div class="overlay" id="overlay"></div>

<!-- ── CONTENT ── -->
<main class="content" id="content">
  <div class="time-row" id="timeRow">
    <span class="time-label">재생 시간</span>
    <button class="time-chip on" data-max="9999">전체</button>
    <button class="time-chip" data-max="5">5분 이하</button>
    <button class="time-chip" data-min="5" data-max="10">5~10분</button>
    <button class="time-chip" data-min="10" data-max="15">10~15분</button>
    <button class="time-chip" data-min="15" data-max="20">15~20분</button>
    <button class="time-chip" data-min="20" data-max="30">20~30분</button>
    <button class="time-chip" data-min="30" data-max="9999">30분 초과</button>
  </div>
  <div class="grade-row" id="gradeRow">
    <span class="time-label">초등 학년</span>
    <button class="time-chip on" data-grade="all">전체</button>
    <button class="time-chip" data-grade="low">저학년(1~3)</button>
    <button class="time-chip" data-grade="high">고학년(4~6)</button>
  </div>
  <div class="result-row">
    <div class="result-info" id="resultInfo"></div>
    <div class="sort-wrap" id="sortWrap">
      <button class="sort-chip on" data-sort="default">기본순</button>
      <button class="sort-chip" data-sort="durAsc">짧은순</button>
      <button class="sort-chip" data-sort="durDesc">긴순</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="more-wrap" id="moreWrap" style="display:none;">
    <button class="more-btn" id="moreBtn">영상 더 보기</button>
  </div>
  <div class="empty-box" id="emptyBox">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <p>조건에 맞는 영상이 없어요</p>
  </div>
</main>

<script>
/* ────────────────────────────────────────── */
const PAGE = 60;
/* ────────────────────────────────────────── */

const CATS = [
  { key:'all',      label:'전체',           icon:'▶', group:null },
  { key:'학교폭력예방', label:'학교폭력예방',  icon:'🛡', group:'의무교육' },
  { key:'생명존중',    label:'생명존중',      icon:'💚', group:'의무교육' },
  { key:'성교육',      label:'성교육·성폭력예방', icon:'🌸', group:'의무교육' },
  { key:'도박예방',    label:'도박예방',      icon:'🎰', group:'의무교육' },
  { key:'금연',        label:'금연·흡연예방', icon:'🚭', group:'의무교육' },
  { key:'음주예방',    label:'음주예방',      icon:'🍃', group:'의무교육' },
  { key:'약물예방',    label:'약물예방',      icon:'💊', group:'의무교육' },
  { key:'장애인식',    label:'장애인식개선',  icon:'♿', group:'의무교육' },
  { key:'다문화',      label:'다문화',        icon:'🌍', group:'의무교육' },
  { key:'안전교육',    label:'안전교육',      icon:'🦺', group:'건강·안전' },
  { key:'건강',        label:'건강·보건',    icon:'❤️', group:'건강·안전' },
  { key:'정신건강',    label:'정신건강',      icon:'🧠', group:'건강·안전' },
  { key:'식품안전',    label:'식품안전·영양', icon:'🥗', group:'건강·안전' },
  { key:'환경',        label:'환경·기후',    icon:'🌱', group:'가치·사회' },
  { key:'민주시민',    label:'민주시민·인권', icon:'🗳️', group:'가치·사회' },
  { key:'통일평화',    label:'통일·평화',    icon:'🕊️', group:'가치·사회' },
  { key:'역사',        label:'역사·독립운동', icon:'📜', group:'가치·사회' },
  { key:'세계시민',    label:'세계시민',      icon:'🌐', group:'가치·사회' },
  { key:'봉사나눔',    label:'봉사·나눔',    icon:'🤲', group:'가치·사회' },
  { key:'인성',        label:'인성·공감',    icon:'🤝', group:'성장·진로' },
  { key:'미디어',      label:'미디어·디지털', icon:'📱', group:'성장·진로' },
  { key:'진로',        label:'진로·꿈',      icon:'⭐', group:'성장·진로' },
  { key:'경제금융',    label:'경제·금융',    icon:'💰', group:'성장·진로' },
  { key:'독서',        label:'독서·글쓰기',  icon:'📚', group:'성장·진로' },
  { key:'소비자교육',  label:'소비자교육',   icon:'🛒', group:'성장·진로' },
  { key:'개인정보',    label:'개인정보보호',  icon:'🔒', group:'성장·진로' },
  { key:'직업창업',    label:'직업·창업',    icon:'💼', group:'성장·진로' },
];

let VIDEOS = [];

async function boot() {


/* 분 → "M:SS" 포맷 */
function fmtMin(m) {
  const tot = Math.round(m * 60);
  const mm = Math.floor(tot/60), ss = tot%60;
  return mm + ':' + String(ss).padStart(2,'0');
}

/* ── 사이드바 생성 ── */
const catCounts = {};
VIDEOS.forEach(v => { catCounts[v.cat] = (catCounts[v.cat]||0)+1; });

const sb = document.getElementById('sidebar');
let lastGrp = null;

/* ── 즐겨찾기 / 최근시청 (localStorage) ── */
let favorites = new Set(JSON.parse(localStorage.getItem('ctv_favorites') || '[]'));
let recentWatched = JSON.parse(localStorage.getItem('ctv_recent') || '[]');

function saveFavorites() { localStorage.setItem('ctv_favorites', JSON.stringify([...favorites])); }
function saveRecent() { localStorage.setItem('ctv_recent', JSON.stringify(recentWatched)); }

function toggleFavorite(id) {
  if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
  saveFavorites();
  updateSpecialCounts();
  if (aCat === '__fav__') render();
}

function recordWatch(id) {
  recentWatched = recentWatched.filter(x => x !== id);
  recentWatched.unshift(id);
  if (recentWatched.length > 30) recentWatched.length = 30;
  saveRecent();
  updateSpecialCounts();
}

function updateSpecialCounts() {
  const fc = document.getElementById('sbFavCount');
  const rc = document.getElementById('sbRecentCount');
  if (fc) fc.textContent = favorites.size;
  if (rc) rc.textContent = recentWatched.length;
}

CATS.forEach(c => {
  if (c.key === 'all') {
    const el = mkSbItem(c, VIDEOS.length, true);
    sb.appendChild(el);

    const favEl = document.createElement('div');
    favEl.className = 'sb-item';
    favEl.dataset.cat = '__fav__';
    favEl.innerHTML = `<span class="sb-icon">⭐</span><span class="sb-label">즐겨찾기</span><span class="sb-count" id="sbFavCount">${favorites.size}</span>`;
    favEl.addEventListener('click', () => selectCat('__fav__'));
    sb.appendChild(favEl);

    const recentEl = document.createElement('div');
    recentEl.className = 'sb-item';
    recentEl.dataset.cat = '__recent__';
    recentEl.innerHTML = `<span class="sb-icon">🕐</span><span class="sb-label">최근 시청</span><span class="sb-count" id="sbRecentCount">${recentWatched.length}</span>`;
    recentEl.addEventListener('click', () => selectCat('__recent__'));
    sb.appendChild(recentEl);

    const hr = document.createElement('hr'); hr.className='sb-sep';
    sb.appendChild(hr);
    return;
  }
  if (c.group !== lastGrp) {
    const lbl = document.createElement('div');
    lbl.className='sb-group-label'; lbl.textContent=c.group;
    sb.appendChild(lbl); lastGrp=c.group;
  }
  sb.appendChild(mkSbItem(c, catCounts[c.key]||0, false));
});

function mkSbItem(c, cnt, active) {
  const el = document.createElement('div');
  el.className = 'sb-item' + (active?' on':'');
  el.dataset.cat = c.key;
  el.innerHTML = `<span class="sb-icon">${c.icon}</span><span class="sb-label">${c.label}</span><span class="sb-count">${cnt}</span>`;
  el.addEventListener('click', () => selectCat(c.key));
  return el;
}

/* ── STATE ── */
let aCat='all', aLv='all', aGrade='all', maxMin=9999, minMin=0, q='', showN=PAGE, sortMode='default';

function getMin(v) {
  return v.dur !== undefined ? v.dur : 9999;
}

function filtered() {
  let base;
  if (aCat === '__fav__') {
    base = VIDEOS.filter(v => favorites.has(v.id));
  } else if (aCat === '__recent__') {
    base = recentWatched.map(id => VIDEOS.find(v => v.id === id)).filter(Boolean);
  } else {
    base = VIDEOS;
  }

  let list = base.filter(v => {
    const dur = getMin(v);
    if (dur > maxMin) return false;
    if (minMin > 0 && dur <= minMin) return false;
    if (aCat!=='all' && aCat!=='__fav__' && aCat!=='__recent__' && v.cat!==aCat) return false;
    if (aLv!=='all' && v.lv!==aLv && v.lv!=='all') return false;
    if (aLv==='elem' && aGrade!=='all' && v.grade && v.grade!==aGrade) return false;
    if (q) { const lo=q.toLowerCase(); if(!v.title.toLowerCase().includes(lo)&&!v.cat.includes(q)) return false; }
    return true;
  });

  if (aCat !== '__recent__') {
    if (sortMode === 'durAsc') list = [...list].sort((a,b) => getMin(a)-getMin(b));
    else if (sortMode === 'durDesc') list = [...list].sort((a,b) => getMin(b)-getMin(a));
  }
  return list;
}

function lvBadge(lv) {
  if (lv==='elem') return {cls:'vb-elem',txt:'초등'};
  if (lv==='mid')  return {cls:'vb-mid', txt:'중등'};
  return {cls:'vb-all',txt:'전체'};
}

function render() {
  const list = filtered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyBox');
  const mw = document.getElementById('moreWrap');
  const ri = document.getElementById('resultInfo');

  let catName;
  if (aCat === '__fav__') catName = '즐겨찾기';
  else if (aCat === '__recent__') catName = '최근 시청';
  else if (aCat === 'all') catName = '전체';
  else catName = aCat;
  ri.textContent = `${catName} · ${list.length}개`;

  if (!list.length) {
    grid.innerHTML=''; empty.style.display='block'; mw.style.display='none'; return;
  }
  empty.style.display='none';

  const page = list.slice(0, showN);
  const frag = document.createDocumentFragment();
  page.forEach(v => {
    const lv = lvBadge(v.lv);
    const yt = `https://www.youtube.com/watch?v=${v.id}`;
    const durTxt = fmtMin(v.dur);
    const isFav = favorites.has(v.id);
    const div = document.createElement('div');
    div.className = 'vcard';
    div.innerHTML = `
      <div class="vthumb">
        <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg"
             alt="${v.title.replace(/"/g,'&quot;')}" loading="lazy"
             onerror="this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg'">
        <button class="fav-btn${isFav?' on':''}" data-id="${v.id}" aria-label="즐겨찾기">${isFav?'★':'☆'}</button>
        <span class="vdur" data-id="${v.id}">${durTxt}</span>
        <div class="vplay"><div class="vplay-circle"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div></div>
      </div>
      <div class="vinfo">
        <div class="vbadges">
          <span class="vbadge vb-${v.cat}">${v.cat}</span>
          <span class="vbadge ${lv.cls}">${lv.txt}</span>
        </div>
        <p class="vtitle">${v.title}</p>
        ${v.desc ? `<p class="vdesc">${v.desc}</p>` : ''}
        <div class="vmeta">${durTxt}</div>
      </div>`;
    div.querySelector('.fav-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite(v.id);
      e.currentTarget.classList.toggle('on');
      e.currentTarget.textContent = favorites.has(v.id) ? '★' : '☆';
    });
    div.addEventListener('click', () => { recordWatch(v.id); window.open(yt,'_blank'); });
    frag.appendChild(div);
  });
  grid.innerHTML='';
  grid.appendChild(frag);

  if (list.length > showN) {
    mw.style.display='block';
    document.getElementById('moreBtn').textContent = `영상 더 보기 (${list.length-showN}개 남음)`;
  } else { mw.style.display='none'; }
}

function selectCat(cat) {
  aCat=cat; showN=PAGE;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('on', el.dataset.cat===cat));
  render();
  if (window.innerWidth<=768) closeSidebar();
}

/* events */
document.querySelectorAll('.time-chip').forEach(b => b.addEventListener('click', () => {
  if (b.disabled) return;
  document.querySelectorAll('.time-chip').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  maxMin=parseFloat(b.dataset.max||9999); minMin=parseFloat(b.dataset.min||0); showN=PAGE; render();
}));

document.querySelectorAll('.lvl-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.lvl-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); aLv=b.dataset.lv; showN=PAGE;
  aGrade='all';
  document.querySelectorAll('.grade-row .time-chip').forEach(x=>x.classList.toggle('on', x.dataset.grade==='all'));
  document.getElementById('gradeRow').classList.toggle('show', aLv==='elem');
  render();
}));

document.querySelectorAll('.grade-row .time-chip').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.grade-row .time-chip').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); aGrade=b.dataset.grade; showN=PAGE; render();
}));

document.querySelectorAll('.sort-chip').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.sort-chip').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); sortMode=b.dataset.sort; showN=PAGE; render();
}));

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { q=e.target.value.trim(); showN=PAGE; render(); }, 200);
});

document.getElementById('moreBtn').addEventListener('click', () => { showN+=PAGE; render(); });

/* sidebar toggle */
function closeSidebar() {
  document.getElementById('sidebarShell').classList.remove('open');
  document.getElementById('overlay').style.display='none';
}

document.getElementById('menuBtn').addEventListener('click', () => {
  const s=document.getElementById('sidebarShell');
  const ov=document.getElementById('overlay');
  const c=document.getElementById('content');
  if (window.innerWidth<=768) {
    const o=s.classList.toggle('open');
    ov.style.display=o?'block':'none';
  } else {
    s.classList.toggle('hidden');
    c.classList.toggle('full');
  }
});

document.getElementById('overlay').addEventListener('click', () => closeSidebar());

/* ── INIT ── */
render();
}

fetch('videos.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => { VIDEOS = data; boot(); })
  .catch(err => {
    console.error('영상 데이터 로드 실패:', err);
    const grid = document.getElementById('grid');
    if (grid) grid.innerHTML = '<p style="padding:60px 20px;text-align:center;color:#999;grid-column:1/-1">영상 데이터를 불러오지 못했습니다. 새로고침 해주세요.</p>';
  });
</script>
</body>
</html>
